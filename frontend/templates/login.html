<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Auto EDA Insight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-page">
  <div class="login-panel">
    <h1>Login ke AutoEDA</h1>
    <p>Masuk dengan akun Anda untuk mulai mengunggah dataset dan melihat insight otomatis.</p>
    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label for="username">Nama Pengguna</label>
      <input id="username" name="username" type="text" autocomplete="username" placeholder="Nama pengguna" required>
      <label for="password">Kata Sandi</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="******" required>
      <div class="login-actions">
        <button class="btn-primary" type="submit">Masuk</button>
        <a class="btn-secondary" href="{{ url_for('register') }}">Daftar Akun Baru</a>
      </div>
    </form>
  </div>
</body>
</html>
